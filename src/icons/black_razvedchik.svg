<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 50">
  <!-- Razvedchik (Разведчик) - Black - Knight analogue, horse head silhouette -->
  <!-- Ears -->
  <path d="M17 8 L15 2 L18 7" fill="#333" stroke="#ccc" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M22 6 L21 1 L24 5" fill="#333" stroke="#ccc" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- Horse head -->
  <path d="M13 20 Q11 14 14 9 Q16 5 22 5 Q28 5 30 10 Q32 14 31 18 L33 22 L30 22 Q29 18 28 16 Q26 20 22 22 Q18 24 15 22 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Eye -->
  <circle cx="21" cy="11" r="1.8" fill="#ccc"/>
  <!-- Nostril -->
  <circle cx="14.5" cy="17" r="1.2" fill="#ccc" opacity="0.5"/>
  <!-- Mouth line -->
  <path d="M13 20 Q14 21 15 20" fill="none" stroke="#ccc" stroke-width="1"/>
  <!-- Mane -->
  <path d="M25 7 Q28 9 29 12 Q30 9 28 6" fill="#333" stroke="#ccc" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Neck / body -->
  <path d="M15 22 L12 30 L11 38 L34 38 L33 30 L30 22 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Collar decoration -->
  <line x1="15" y1="25" x2="30" y2="25" stroke="#ccc" stroke-width="1.2"/>
  <!-- Base -->
  <path d="M9 38 L9 42 Q9 45 12 45 L33 45 Q36 45 36 42 L36 38 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="9" y1="41" x2="36" y2="41" stroke="#ccc" stroke-width="1"/>
</svg>
