<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 50">
  <!-- Ver Knekht (Вер Кнехт) - Black - Veteran pawn, pawn with chevron/badge -->
  <!-- Ball on top -->
  <circle cx="22.5" cy="10" r="6.5" fill="#333" stroke="#ccc" stroke-width="1.5"/>
  <!-- Chevron mark on head -->
  <path d="M20 9 L22.5 12 L25 9" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Collar / epaulettes -->
  <path d="M15 17 L18 16 L22.5 18 L27 16 L30 17 L29 21 L16 21 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Neck -->
  <path d="M19 16 L18 21 L27 21 L26 16"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Body -->
  <path d="M15 21 Q13 30 12 38 L33 38 Q32 30 30 21 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Chevron on body -->
  <path d="M18 27 L22.5 31 L27 27" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M18 31 L22.5 35 L27 31" fill="none" stroke="#ccc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Base -->
  <path d="M10 38 L10 42 Q10 45 13 45 L32 45 Q35 45 35 42 L35 38 Z"
        fill="#333" stroke="#ccc" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="10" y1="41" x2="35" y2="41" stroke="#ccc" stroke-width="1"/>
</svg>
