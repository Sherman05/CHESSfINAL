<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Outer rounded rectangle frame -->
  <rect x="2" y="2" width="36" height="36" rx="8" fill="#b3b3b3" fill-opacity="0.15" stroke="#1f1203" stroke-width="1.5"/>
  <!-- White rectangle (top) - not selected -->
  <rect x="6" y="5" width="20" height="13" rx="2" fill="#ffffff" stroke="#000000" stroke-width="1"/>
  <!-- Empty indicator circle on white = not selected -->
  <circle cx="32" cy="11.5" r="4" fill="none" stroke="#646464" stroke-width="1.5"/>
  <!-- Black rectangle (bottom) - selected -->
  <rect x="6" y="22" width="20" height="13" rx="2" fill="#000000" stroke="#000000" stroke-width="1"/>
  <!-- Filled indicator circle on black = selected -->
  <circle cx="32" cy="28.5" r="4" fill="#646464"/>
</svg>
