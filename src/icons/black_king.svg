  <!-- Waist line -->
  <line x1="15" y1="33" x2="30" y2="33" stroke="#ccc" stroke-width="1"/>
  <!-- Base -->
  <path d="M10 38 L10 42 Q10 45 14 45 L31 45 Q35 45 35 42 L35 38 Z"
