<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 50">
  <!-- Ritter (Риттер) - White - Rook analogue with battlements -->
  <!-- Battlements (crenellations) -->
  <path d="M12 10 L12 5 L16 5 L16 10 L19 10 L19 5 L23 5 L23 10 L26 10 L26 5 L30 5 L30 10 L33 10 L33 5 L37 5 L37 10"
        fill="#fff" stroke="#333" stroke-width="1.5" stroke-linejoin="miter"/>
  <!-- Top wall connecting battlements -->
  <rect x="12" y="10" width="25" height="5" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- Upper body -->
  <path d="M14 15 L13 22 L36 22 L35 15"
        fill="#fff" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Middle band -->
  <rect x="13" y="22" width="23" height="3" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <!-- Lower body tapering -->
  <path d="M13 25 Q12 31 11 38 L38 38 Q37 31 36 25 Z"
        fill="#fff" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Window slit -->
  <rect x="22" y="28" width="5" height="7" rx="2.5" fill="#333" opacity="0.3"/>
  <!-- Base -->
  <path d="M9 38 L9 42 Q9 45 12 45 L37 45 Q40 45 40 42 L40 38 Z"
        fill="#fff" stroke="#333" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="9" y1="41" x2="40" y2="41" stroke="#333" stroke-width="1"/>
</svg>
